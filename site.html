<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messenger</title>

    <!-- 1. ПОДКЛЮЧАЕМ FIREBASE СРАЗУ В ГОЛОВЕ ФАЙЛА -->
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>

    <style>
        body { background: #000; color: #fff; font-family: monospace; margin: 0; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        .screen { position: fixed; inset: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
        .box { border: 1px solid #fff; padding: 20px; text-align: center; }
        input, button { background: #000; color: #fff; border: 1px solid #fff; padding: 10px; margin: 5px; font-family: monospace; }
        button:hover { background: #fff; color: #000; cursor: pointer; }
        #chat-ui { display: none; flex-direction: column; height: 100%; }
        #messages { flex: 1; overflow-y: auto; padding: 20px; border-bottom: 1px solid #fff; }
        .msg { margin-bottom: 10px; border-left: 2px solid #fff; padding-left: 10px; }
        #controls { display: flex; padding: 10px; gap: 5px; }
        #msg-input { flex: 1; }
        #player { position: fixed; top: 10px; left: 10px; border: 1px solid #fff; padding: 5px; font-size: 10px; z-index: 500; background: #000; }
    </style>
</head>
<body>

    <!-- ШАГ 1 -->
    <div id="step1" class="screen">
        <div class="box">
            <h3>SYSTEM LOCK</h3>
            <input type="password" id="gate-pass" placeholder="11111">
            <button onclick="checkGate()">UNLOCK</button>
        </div>
    </div>

    <!-- ШАГ 2 -->
    <div id="step2" class="screen" style="display: none;">
        <div class="box">
            <h3>IDENTIFY</h3>
            <input type="password" id="user-pass" placeholder="PASSWORD">
            <button onclick="login()">ENTER</button>
        </div>
    </div>

    <!-- ЧАТ -->
    <div id="chat-ui">
        <div id="player">
            <div id="track-name">OFFLINE</div>
            <button onclick="toggleAudio()">PLAY/PAUSE</button>
            <audio id="audio" src=""></audio>
        </div>
        <div id="messages"></div>
        <div id="controls">
            <input type="text" id="msg-input" placeholder="Message...">
            <button onclick="send()">SEND</button>
        </div>
    </div>

<script>
    // СНАЧАЛА ОБЪЯВЛЯЕМ ВСЕ ПЕРЕМЕННЫЕ (Чтобы не было ошибок "before initialization")
    var currentUser = "";
    var accounts = {
        "ORANGE19411": "Апельсинка Зарина",
        "dachkatze1188": "дакатзе софи"
    };

    var firebaseConfig = {
        apiKey: "AIzaSyAvfrN1CC4plLtTppWY8B-rqxl3s54tXVI",
        databaseURL: "https://firebasedatabase.app",
        projectId: "chat84596",
        appId: "1:270727647024:web:f35eb59998cdc7752d42f5"
    };

    // ПРОВЕРЯЕМ FIREBASE
    if (typeof firebase !== 'undefined') {
        firebase.initializeApp(firebaseConfig);
        var db = firebase.database();
    }

    function checkGate() {
        if (document.getElementById('gate-pass').value === "11111") {
            document.getElementById('step1').style.display = 'none';
            document.getElementById('step2').style.display = 'flex';
        } else { alert("WRONG GATE CODE"); }
    }

    function login() {
        var p = document.getElementById('user-pass').value;
        if (accounts[p]) {
            currentUser = accounts[p];
            document.getElementById('step2').style.display = 'none';
            document.getElementById('chat-ui').style.display = 'flex';
            loadMessages();
        } else { alert("ACCESS DENIED"); }
    }

    function send() {
        var input = document.getElementById('msg-input');
        if (input.value && currentUser && db) {
            db.ref("messages").push({ user: currentUser, text: input.value, timestamp: Date.now() });
            input.value = "";
        }
    }

    function loadMessages() {
        db.ref("messages").limitToLast(50).on("child_added", function(s) {
            var d = s.val();
            var m = document.createElement("div");
            m.className = "msg";
            m.innerHTML = "<b>" + d.user + ":</b> " + d.text;
            document.getElementById("messages").appendChild(m);
            document.getElementById("messages").scrollTop = document.getElementById("messages").scrollHeight;
        });
    }

    function toggleAudio() {
        var a = document.getElementById('audio');
        a.paused ? a.play() : a.pause();
    }
</script>
</body>
</html>
