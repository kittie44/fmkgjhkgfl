<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BW Messenger</title>

    <!-- ИСПРАВЛЕННЫЕ ССЫЛКИ (Теперь firebase будет "defined") -->
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>

    <style>
        body { background: #000; color: #fff; font-family: 'Courier New', monospace; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .full-screen-auth { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .auth-box { border: 1px solid #fff; padding: 30px; text-align: center; }
        #player-container { position: fixed; top: 10px; left: 10px; z-index: 100; background: #000; border: 1px solid #fff; padding: 10px; width: 200px; }
        .player-btn { background: #000; color: #fff; border: 1px solid #fff; cursor: pointer; padding: 5px; font-size: 10px; margin: 2px; }
        #chat-container { display: none; flex-direction: column; height: 100%; padding-top: 110px; }
        #messages { flex: 1; overflow-y: auto; padding: 20px; border-bottom: 1px solid #fff; }
        #controls { display: flex; padding: 15px; gap: 10px; }
        input { background: #000; color: #fff; border: 1px solid #fff; padding: 10px; }
        .msg { border-left: 2px solid #fff; padding-left: 10px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <!-- ЭКРАН 1 -->
    <div id="gate-screen" class="full-screen-auth">
        <div class="auth-box">
            <h3>MAIN GATE</h3>
            <input type="password" id="gate-pass" placeholder="11111">
            <button class="player-btn" onclick="checkGate()">UNLOCK</button>
        </div>
    </div>

    <!-- ЭКРАН 2 -->
    <div id="auth-screen" class="full-screen-auth" style="display: none;">
        <div class="auth-box">
            <h3>LOGIN</h3>
            <input type="password" id="user-pass" placeholder="Пароль...">
            <button class="player-btn" onclick="login()">ENTER</button>
        </div>
    </div>

    <!-- ПЛЕЕР -->
    <div id="player-container">
        <div id="track-title" style="font-size: 12px; margin-bottom: 5px;">STOPPED</div>
        <audio id="audio"></audio>
        <button class="player-btn" onclick="togglePlay()">PLAY/PAUSE</button>
    </div>

    <!-- ЧАТ -->
    <div id="chat-container">
        <div id="messages"></div>
        <div id="controls">
            <input type="text" id="msg-input" style="flex:1">
            <button class="player-btn" onclick="sendMessage()">SEND</button>
        </div>
    </div>

<script>
    // ПЕРЕМЕННЫЕ В САМОМ НАЧАЛЕ (Чтобы не было ошибок инициализации)
    const accounts = {
        "ORANGE19411": "Апельсинка Зарина",
        "dachkatze1188": "дакатзе софи"
    };

    const firebaseConfig = {
        apiKey: "AIzaSyAvfrN1CC4plLtTppWY8B-rqxl3s54tXVI",
        authDomain: "://firebaseapp.com",
        projectId: "chat84596",
        storageBucket: "chat84596.firebasestorage.app",
        messagingSenderId: "270727647024",
        appId: "1:270727647024:web:f35eb59998cdc7752d42f5",
        databaseURL: "https://firebaseio.com"
    };

    // ЗАПУСК
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let currentUser = "";

    function checkGate() {
        if (document.getElementById('gate-pass').value === "11111") {
            document.getElementById('gate-screen').style.display = 'none';
            document.getElementById('auth-screen').style.display = 'flex';
        } else { alert("WRONG"); }
    }

    function login() {
        const pass = document.getElementById('user-pass').value;
        if (accounts[pass]) {
            currentUser = accounts[pass];
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('chat-container').style.display = 'flex';
            loadMessages();
        } else { alert("DENIED"); }
    }

    function sendMessage() {
        const t = document.getElementById('msg-input').value;
        if (!t) return;
        db.ref("messages").push({ user: currentUser, text: t });
        document.getElementById('msg-input').value = "";
    }

    function loadMessages() {
        db.ref("messages").limitToLast(20).on("child_added", (s) => {
            const d = s.val();
            const m = document.createElement("div");
            m.className = "msg";
            m.innerHTML = `<b>${d.user}:</b> ${d.text}`;
            document.getElementById("messages").appendChild(m);
            document.getElementById("messages").scrollTop = document.getElementById("messages").scrollHeight;
        });
    }

    const audio = document.getElementById('audio');
    function togglePlay() { audio.paused ? audio.play() : audio.pause(); }
</script>
</body>
</html>
