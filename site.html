<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Chat</title>
    <!-- Используем одну компактную ссылку, она обычно пролетает через блокировки -->
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
    <style>
        body { background: #000; color: #fff; font-family: monospace; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        .screen { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 1000; flex-direction: column; border: 5px solid #fff; }
        input, button { background: #000; color: #fff; border: 1px solid #fff; padding: 15px; margin: 10px; font-size: 18px; }
        #chat-ui { display: none; flex-direction: column; height: 100%; }
        #messages { flex: 1; overflow-y: auto; padding: 20px; }
        .msg { margin-bottom: 15px; border-left: 3px solid #fff; padding-left: 10px; }
        #controls { display: flex; padding: 10px; border-top: 1px solid #fff; }
        #m-i { flex: 1; }
    </style>
</head>
<body>
    <div id="s1" class="screen"><h3>STEP 1: 11111</h3><input type="password" id="g-p"><button onclick="go1()">OK</button></div>
    <div id="s2" class="screen" style="display:none"><h3>STEP 2: PASS</h3><input type="password" id="u-p"><button onclick="go2()">OK</button></div>
    <div id="chat-ui">
        <div id="messages"></div>
        <div id="controls"><input type="text" id="m-i"><button onclick="send()">SEND</button></div>
    </div>
<script>
    var accs = {"ORANGE19411": "Зарина", "dachkatze1188": "Софи"};
    var user = "";
    var cfg = {
        databaseURL: "https://firebasedatabase.app",
        projectId: "chat84596"
    };

    // Пытаемся запустить базу
    try {
        firebase.initializeApp(cfg);
        var db = firebase.database();
    } catch(e) { alert("Включи VPN на минуту, чтобы база проснулась!"); }

    function go1() { if(document.getElementById('g-p').value === "11111") { document.getElementById('s1').style.display='none'; document.getElementById('s2').style.display='flex'; } }
    function go2() { 
        var p = document.getElementById('u-p').value;
        if(accs[p]) { user = accs[p]; document.getElementById('s2').style.display='none'; document.getElementById('chat-ui').style.display='flex'; load(); } 
    }
    function send() {
        var i = document.getElementById('m-i');
        if(i.value && db) { db.ref("messages").push({u: user, t: i.value}); i.value = ""; }
    }
    function load() {
        db.ref("messages").limitToLast(50).on("child_added", function(s) {
            var d = s.val();
            var m = document.createElement("div");
            m.className = "msg";
            m.innerHTML = "<b>"+d.u+":</b> "+d.t;
            document.getElementById("messages").appendChild(m);
            document.getElementById("messages").scrollTop = document.getElementById("messages").scrollHeight;
        });
    }
</script>
</body>
</html>
