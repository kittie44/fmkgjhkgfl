<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messenger</title>
    <!-- ИСПОЛЬЗУЕМ ЗЕРКАЛА (Cloudflare), ИХ СЛОЖНЕЕ ЗАБЛОКИРОВАТЬ -->
    <script src="https://cloudflare.com"></script>
    <script src="https://cloudflare.com"></script>
    <style>
        body { background: #000; color: #fff; font-family: monospace; margin: 0; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        .screen { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 1000; flex-direction: column; }
        .box { border: 1px solid #fff; padding: 20px; text-align: center; }
        input, button { background: #000; color: #fff; border: 1px solid #fff; padding: 10px; margin: 5px; }
        #chat-ui { display: none; flex-direction: column; height: 100%; padding-top: 20px; }
        #messages { flex: 1; overflow-y: auto; padding: 20px; border-bottom: 1px solid #fff; }
        .msg { margin-bottom: 10px; border-left: 2px solid #fff; padding-left: 10px; }
        #controls { display: flex; padding: 10px; gap: 5px; }
        #m-i { flex: 1; }
    </style>
</head>
<body>
    <div id="s1" class="screen"><div class="box"><h3>SYSTEM LOCK</h3><input type="password" id="g-p" placeholder="11111"><button onclick="go1()">OK</button></div></div>
    <div id="s2" class="screen" style="display:none"><div class="box"><h3>IDENTIFY</h3><input type="password" id="u-p" placeholder="PASS"><button onclick="go2()">OK</button></div></div>
    <div id="chat-ui">
        <div id="messages"></div>
        <div id="controls"><input type="text" id="m-i"><button onclick="send()">SEND</button></div>
    </div>
<script>
    var accs = {"ORANGE19411": "Зарина", "dachkatze1188": "Софи"};
    var user = "";
    var cfg = {
        apiKey: "AIzaSyAvfrN1CC4plLtTppWY8B-rqxl3s54tXVI",
        databaseURL: "https://firebasedatabase.app",
        projectId: "chat84596"
    };

    // БЕЗОПАСНЫЙ ЗАПУСК
    function init() {
        if (typeof firebase !== 'undefined') {
            firebase.initializeApp(cfg);
            window.db = firebase.database();
            console.log("Firebase OK");
        } else {
            alert("ОШИБКА: Библиотеки заблокированы. ВКЛЮЧИ VPN!");
        }
    }
    init();

    function go1() {
        if (document.getElementById('g-p').value === "11111") {
            document.getElementById('s1').style.display = 'none';
            document.getElementById('s2').style.display = 'flex';
        }
    }

    function go2() {
        var p = document.getElementById('u-p').value;
        if (accs[p]) {
            user = accs[p];
            document.getElementById('s2').style.display = 'none';
            document.getElementById('chat-ui').style.display = 'flex';
            load();
        } else { alert("ACCESS DENIED"); }
    }

    function send() {
        var i = document.getElementById('m-i');
        if (i.value && window.db) {
            window.db.ref("messages").push({ u: user, t: i.value });
            i.value = "";
        }
    }

    function load() {
        if (!window.db) return;
        window.db.ref("messages").limitToLast(50).on("child_added", function(s) {
            var d = s.val();
            var m = document.createElement("div");
            m.className = "msg";
            m.innerHTML = "<b>" + d.u + ":</b> " + d.t;
            document.getElementById("messages").appendChild(m);
            document.getElementById("messages").scrollTop = document.getElementById("messages").scrollHeight;
        });
    }
</script>
</body>
</html>
