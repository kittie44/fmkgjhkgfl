<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BW Messenger — Private</title>

    <!-- ПОДКЛЮЧЕНИЕ FIREBASE (Обязательно эти три ссылки) -->
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>

    <style>
        /* ЧЕРНО-БЕЛЫЙ СТИЛЬ */
        body {
            background: #000; color: #fff; font-family: 'Courier New', monospace;
            margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }

        /* ПЛЕЕР (Верхний левый угол) */
        #player-container {
            position: fixed; top: 10px; left: 10px; z-index: 100;
            background: #000; border: 1px solid #fff; padding: 10px; width: 220px;
        }
        .marquee { overflow: hidden; white-space: nowrap; border-bottom: 1px solid #fff; margin-bottom: 8px; height: 20px; }
        .marquee span { display: inline-block; animation: scroll 10s linear infinite; font-size: 14px; padding-left: 100%; }
        @keyframes scroll { 0% { transform: translateX(0); } 100% { transform: translateX(-200%); } }
        
        .player-btn { background: #000; color: #fff; border: 1px solid #fff; cursor: pointer; font-size: 10px; padding: 5px; text-transform: uppercase; }
        .player-btn:hover { background: #fff; color: #000; }
        
        #playlist { display: none; background: #000; border: 1px solid #fff; margin-top: 10px; max-height: 150px; overflow-y: auto; padding: 5px; }
        #music-search { width: 90%; background: #000; color: #fff; border: 1px solid #444; margin-bottom: 5px; padding: 3px; font-size: 10px; }
        .track-item { cursor: pointer; padding: 5px; font-size: 11px; border-bottom: 1px solid #222; }
        .track-item:hover { background: #fff; color: #000; }

        /* ЭКРАНЫ АВТОРИЗАЦИИ */
        .full-screen-auth {
            position: fixed; inset: 0; background: #000; z-index: 1000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .auth-box { border: 1px solid #fff; padding: 30px; text-align: center; min-width: 250px; }

        /* ЧАТ */
        #chat-container { display: none; flex-direction: column; height: 100%; padding-top: 110px; }
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; scroll-behavior: smooth; }
        .msg { border-left: 3px solid #fff; padding: 5px 10px; background: #111; max-width: 85%; }
        .msg b { color: #888; font-size: 10px; display: block; text-transform: uppercase; }
        
        /* КНОПКИ И ВВОД */
        #controls { display: flex; padding: 15px; background: #000; border-top: 1px solid #fff; gap: 10px; }
        input[type="text"], input[type="password"] { background: #000; color: #fff; border: 1px solid #fff; padding: 10px; font-family: monospace; }
        #msg-input { flex: 1; }
        
        /* Мобильная версия */
        @media (max-width: 600px) {
            #player-container { width: 140px; padding: 5px; }
            #chat-container { padding-top: 130px; }
        }
    </style>
</head>
<body>

    <!-- ЭТАП 1: ГЛАВНЫЙ КОД -->
    <div id="gate-screen" class="full-screen-auth">
        <div class="auth-box">
            <h3>MAIN GATE LOCK</h3>
            <input type="password" id="gate-pass" placeholder="ВВЕДИТЕ 11111...">
            <br><br>
            <button class="player-btn" onclick="checkGate()">UNLOCK</button>
        </div>
    </div>

    <!-- ЭТАП 2: ЛИЧНЫЙ ПАРОЛЬ -->
    <div id="auth-screen" class="full-screen-auth" style="display: none;">
        <div class="auth-box">
            <h3>IDENTIFY YOURSELF</h3>
            <input type="password" id="user-pass" placeholder="ЛИЧНЫЙ ПАРОЛЬ...">
            <br><br>
            <button class="player-btn" onclick="login()">ENTER CHAT</button>
        </div>
    </div>

    <!-- ПЛЕЕР -->
    <div id="player-container">
        <div class="marquee"><span id="track-title">ОСТАНОВЛЕНО</span></div>
        <audio id="audio"></audio>
        <div style="display: flex; gap: 5px;">
            <button class="player-btn" onclick="togglePlay()">PLAY/PAUSE</button>
            <button class="player-btn" onclick="togglePlaylist()">СПИСОК</button>
        </div>
        <div id="playlist">
            <input type="text" id="music-search" placeholder="ПОИСК..." onkeyup="filterMusic()">
            <div id="list-items">
                <!-- Сюда вставляй свои ссылки на музыку -->
                <div class="track-item" onclick="playTrack('ССЫЛКА_1', 'two of hearts')">two of hearts</div>
                <div class="track-item" onclick="playTrack('ССЫЛКА_2', 'two virgins:side one')">two virgins:side one</div>
                <div class="track-item" onclick="playTrack('ССЫЛКА_3', 'give`em hell kid')">give`em hell kid</div>
            </div>
        </div>
    </div>

    <!-- ЧАТ -->
    <div id="chat-container">
        <div id="messages"></div>
        <div id="controls">
            <input type="text" id="msg-input" placeholder="Сообщение...">
            <input type="file" id="file-input" style="display:none" onchange="uploadFile()">
            <button class="player-btn" onclick="document.getElementById('file-input').click()">FILE</button>
            <button class="player-btn" onclick="sendMessage()">SEND</button>
        </div>
    </div>

<script>
    // 1. НАСТРОЙКИ FIREBASE
    const firebaseConfig = {
        apiKey: "AIzaSyAvfrN1CC4plLtTppWY8B-rqxl3s54tXVI",
        authDomain: "://firebaseapp.com",
        projectId: "chat84596",
        storageBucket: "chat84596.firebasestorage.app",
        messagingSenderId: "270727647024",
        appId: "1:270727647024:web:f35eb59998cdc7752d42f5",
        databaseURL: "https://firebaseio.com"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const storage = firebase.storage();
    let currentUser = "";

    // 2. ПАРОЛИ
    const accounts = {
        "ORANGE19411": "Апельсинка Зарина",
        "dachkatze1188": "дакатзе софи"
    };

    // Функция первого входа
    function checkGate() {
        const pass = document.getElementById('gate-pass').value;
        if (pass === "11111") {
            document.getElementById('gate-screen').style.display = 'none';
            document.getElementById('auth-screen').style.display = 'flex';
        } else { alert("WRONG CODE"); }
    }

    // Функция логина юзера
    function login() {
        const pass = document.getElementById('user-pass').value;
        if (accounts[pass]) {
            currentUser = accounts[pass];
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('chat-container').style.display = 'flex';
            loadMessages();
        } else { alert("ACCESS DENIED"); }
    }

    // 3. ЛОГИКА ЧАТА
    function sendMessage() {
        const text = document.getElementById('msg-input').value;
        if (!text || !currentUser) return;
        db.ref("messages").push({ user: currentUser, text: text, timestamp: Date.now() });
        document.getElementById('msg-input').value = "";
    }

    function loadMessages() {
        db.ref("messages").limitToLast(50).on("child_added", (snapshot) => {
            const data = snapshot.val();
            const msgDiv = document.createElement("div");
            msgDiv.className = "msg";
            let content = data.file ? `<a href="${data.file}" target="_blank" style="color:#fff">[FILE]</a>` : data.text;
            msgDiv.innerHTML = `<b>${data.user}</b> ${content}`;
            document.getElementById("messages").appendChild(msgDiv);
            document.getElementById("messages").scrollTop = document.getElementById("messages").scrollHeight;
        });
    }

    function uploadFile() {
        const file = document.getElementById('file-input').files[0];
        if (!file) return;
        const ref = storage.ref().child('uploads/' + Date.now() + "_" + file.name);
        ref.put(file).then(snap => snap.ref.getDownloadURL()).then(url => {
            db.ref("messages").push({ user: currentUser, file: url, timestamp: Date.now() });
        });
    }

    // 4. ПЛЕЕР
    const audio = document.getElementById('audio');
    function togglePlay() { audio.paused ? audio.play() : audio.pause(); }
    function togglePlaylist() { 
        const p = document.getElementById('playlist');
        p.style.display = (p.style.display === 'block') ? 'none' : 'block';
    }
    function playTrack(url, name) {
        audio.src = url;
        audio.play();
        document.getElementById('track-title').innerText = name.toUpperCase();
    }
    function filterMusic() {
        let f = document.getElementById('music-search').value.toLowerCase();
        document.querySelectorAll('.track-item').forEach(i => {
            i.style.display = i.innerText.toLowerCase().includes(f) ? "" : "none";
        });
    }
</script>
</body>
</html>
